apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-config
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
data:
  # Application Settings
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # Gemini API Configuration
  GEMINI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"

  # Embedding Configuration
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  EMBEDDING_DIMENSION: "384"

  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"

  # Agent Configuration
  AGENT_MODEL: "gemini-2.5-flash"
  AGENT_MAX_TOKENS: "4096"
  AGENT_TEMPERATURE: "0.7"
  AGENT_COST_PER_MILLION_TOKENS: "6.25"

  # Escalation Configuration
  ESCALATION_EMAIL_LOW: "support-tier1@cloudstream.com"
  ESCALATION_EMAIL_MEDIUM: "support-tier2@cloudstream.com"
  ESCALATION_EMAIL_HIGH: "support-senior@cloudstream.com"
  ESCALATION_EMAIL_CRITICAL: "support-vip@cloudstream.com"

  # Email Notification Configuration
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM_EMAIL: "support@cloudstream.com"
  SMTP_USE_TLS: "true"
  ENABLE_EMAIL_NOTIFICATIONS: "false"

  # Database Connection Pool
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
  DB_POOL_TIMEOUT: "30"

  # Knowledge Base Configuration
  KB_SEARCH_LIMIT: "5"
  KB_MIN_SIMILARITY: "0.7"

  # External Service Endpoints
  KAFKA_BOOTSTRAP_SERVERS: "kafka-client.customer-success-fte.svc.cluster.local:9092"
  REDIS_URL: "redis://redis.customer-success-fte.svc.cluster.local:6379"

  # Kafka Configuration
  KAFKA_TOPIC_PREFIX: "customer-intake"

  # Rate Limiting
  RATE_LIMIT_PER_MINUTE: "10"

  # Gmail Configuration (Optional)
  GMAIL_SUPPORT_ADDRESS: ""
  GMAIL_PUBSUB_TOPIC: ""
  GCP_PROJECT_ID: ""

  # Observability Configuration
  ENABLE_DEBUG_LOGGING: "false"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "false"


