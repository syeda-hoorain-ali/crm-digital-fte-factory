apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: customer-success-fte
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'customer-success-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - customer-success-fte
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_component]
            action: keep
            regex: api
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
        metrics_path: '/metrics/'

      - job_name: 'customer-success-worker'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - customer-success-fte
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_component]
            action: keep
            regex: message-processor
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
        metrics_path: '/metrics/'
