apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
type: Opaque
stringData:
  # Database (Required)
  DATABASE_URL: "${DATABASE_URL}"

  # Gemini API (Required)
  GEMINI_API_KEY: "${GEMINI_API_KEY}"

  # Gmail API (Required - JSON credentials as string)
  GMAIL_SERVICE_ACCOUNT_PATH: "${GMAIL_SERVICE_ACCOUNT_PATH}"

  # Gmail API (Optional - alternative credentials path)
  GMAIL_SUPPORT_CREDENTIALS_PATH: "${GMAIL_SUPPORT_CREDENTIALS_PATH:-}"

  # Gmail Webhook (Optional)
  GMAIL_WEBHOOK_SECRET: "${GMAIL_WEBHOOK_SECRET:-}"

  # Twilio (Required)
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_APP_NUMBER: "${TWILIO_APP_NUMBER}"
  TWILIO_WEBHOOK_SECRET: "${TWILIO_WEBHOOK_SECRET}"

  # SMTP Credentials (Optional - for email notifications)
  SMTP_USERNAME: "${SMTP_USERNAME:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"


