apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ini
  namespace: customer-success-fte
data:
  grafana.ini: |
    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/crm-dashboard.json

    [auth.anonymous]
    enabled = true
    org_role = Viewer

    [users]
    allow_sign_up = false
