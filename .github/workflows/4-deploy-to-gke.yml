name: 4. Deploy to GKE

on:
  workflow_run:
    workflows: ["3. Apply Production Migrations"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

env:
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  DEPLOYMENT_NAME: crm-fte-api
  WORKER_DEPLOYMENT_NAME: crm-fte-worker

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        if: github.event_name == 'workflow_run'
        run: |
          # Construct image tag from commit SHA (same format as workflow 1)
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/crm-digital-fte-factory:${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "📦 Will deploy image: $IMAGE_TAG"

      - name: Set image tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/crm-digital-fte-factory:${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "COMMIT_MESSAGE=Manual dispatch by ${{ github.actor }}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT }}

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Update ConfigMap (if changed)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml -n crm-fte

      - name: Update Secrets (if changed)
        run: |
          # Secrets should be managed separately, but apply if template exists
          if [ -f k8s/secrets.yaml ]; then
            kubectl apply -f k8s/secrets.yaml -n crm-fte
          fi

      - name: Deploy API to GKE
        id: deploy_api
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            crm-fte-api=${{ env.IMAGE_TAG }} \
            -n crm-fte

          kubectl annotate deployment/${{ env.DEPLOYMENT_NAME }} \
            kubernetes.io/change-cause="Deploy ${{ env.COMMIT_SHA }}: ${{ env.COMMIT_MESSAGE }}" \
            -n crm-fte

      - name: Deploy Worker to GKE
        id: deploy_worker
        run: |
          kubectl set image deployment/${{ env.WORKER_DEPLOYMENT_NAME }} \
            crm-fte-worker=${{ env.IMAGE_TAG }} \
            -n crm-fte

          kubectl annotate deployment/${{ env.WORKER_DEPLOYMENT_NAME }} \
            kubernetes.io/change-cause="Deploy ${{ env.COMMIT_SHA }}: ${{ env.COMMIT_MESSAGE }}" \
            -n crm-fte

      - name: Wait for API rollout
        id: wait_api
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n crm-fte --timeout=5m

      - name: Wait for Worker rollout
        id: wait_worker
        run: |
          kubectl rollout status deployment/${{ env.WORKER_DEPLOYMENT_NAME }} -n crm-fte --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n crm-fte -l app=crm-fte-api
          kubectl get pods -n crm-fte -l app=crm-fte-worker

      - name: Check API health
        run: |
          API_URL=$(kubectl get service crm-fte-api-service -n crm-fte -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$API_URL" ]; then
            echo "⚠️ LoadBalancer IP not assigned, skipping external health check"
            # Fall back to in-cluster check
            kubectl exec -n crm-fte deploy/${{ env.DEPLOYMENT_NAME }} -- curl -sf http://localhost:8080/health
            exit 0
          fi
          # Retry for up to 60s — pod may be ready but app still initialising
          for i in {1..6}; do
            curl -sf http://$API_URL/health && echo "✅ Health check passed" && exit 0
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after retries"
          exit 1

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Image: ${{ env.IMAGE_TAG }}"
          echo "Commit: ${{ env.COMMIT_SHA }}"
          kubectl get deployments -n crm-fte
          kubectl get hpa -n crm-fte

      - name: Rollback on failure
        if: failure() && (steps.deploy_api.outcome == 'failure' || steps.deploy_worker.outcome == 'failure' || steps.wait_api.outcome == 'failure' || steps.wait_worker.outcome == 'failure')
        run: |
          echo "❌ Deployment failed, rolling back..."
          kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} -n crm-fte
          kubectl rollout undo deployment/${{ env.WORKER_DEPLOYMENT_NAME }} -n crm-fte
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n crm-fte
          kubectl rollout status deployment/${{ env.WORKER_DEPLOYMENT_NAME }} -n crm-fte