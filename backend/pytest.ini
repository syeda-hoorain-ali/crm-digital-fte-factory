[pytest]
# Pytest configuration for CRM Digital FTE Factory backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.11

# Add project root to Python path
pythonpath = .

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Enable strict markers (fail on unknown markers)
    --strict-markers
    # Show warnings
    -W default
    # Coverage options (when pytest-cov is installed)
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Fail if coverage is below 70%
    --cov-fail-under=70
    # Asyncio mode
    --asyncio-mode=auto

# Markers for test categorization
markers =
    unit: Unit tests with mocked dependencies (fast)
    integration: Integration tests with real database (slower)
    slow: Tests that take significant time to run
    database: Tests that require database connection
    agent: Tests for agent tools and workflows
    formatters: Tests for channel formatters
    session: Tests for session management
    hooks: Tests for agent hooks

# Asyncio configuration
asyncio_mode = auto

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
; timeout = 300

# Ignore paths
norecursedirs = .git .tox dist build *.egg htmlcov __pycache__
